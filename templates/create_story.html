<!DOCTYPE html>
<html>
<head>
    <title>Create Story</title>

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='css/style.css') }}"
    >
</head>

<body>

    <h1>Create Story</h1>

    <form method="POST">

        <input
            type="text"
            name="title"
            placeholder="Story Title"
            required
        >

        <br><br>

        <textarea
            name="content"
            rows="10"
            cols="50"
            placeholder="Write your story..."
            required
        ></textarea>

        <br><br>

        <button type="submit">
            Save Story
        </button>

    </form>

</body>
</html>
