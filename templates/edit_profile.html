{% extends "base.html" %}

{% block title %}
Edit Profile
{% endblock %}

{% block content %}

<h1>Edit Profile</h1>

<form method="POST">

    <textarea
        name="bio"
        rows="8"
        cols="50"
    >{{ current_user.bio }}</textarea>

    <br><br>

    <button type="submit">
        Save
    </button>

</form>

{% endblock %}
