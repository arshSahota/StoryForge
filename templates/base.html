<!DOCTYPE html>
<html>
<head>
    <title>
        {% block title %}
            StoryForge
        {% endblock %}
    </title>

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='css/style.css') }}"
    >
</head>

<body>

    <nav>

        <a href="/">Home</a>

        {% if current_user.is_authenticated %}

            <a href="/dashboard">Dashboard</a>

            <a href="/create-story">
                New Story
            </a>

            <a href="/logout">
                Logout
            </a>

        {% else %}

            <a href="/login">
                Login
            </a>

            <a href="/register">
                Register
            </a>

        {% endif %}

    </nav>

    <div class="container">

        {% block content %}
        {% endblock %}

    </div>

</body>
</html>
