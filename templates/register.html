{% extends "base.html" %}

{% block title %}
Register
{% endblock %}

{% block content %}

<div class="auth-container">

    <h1>Create Account ✨</h1>

    <p>
        Join StoryForge and start creating stories.
    </p>

    <form method="POST">

        <input
            type="text"
            name="username"
            placeholder="Username"
            required
        >

        <br><br>

        <input
            type="email"
            name="email"
            placeholder="Email Address"
            required
        >

        <br><br>

        <input
            type="password"
            name="password"
            placeholder="Password"
            required
        >

        <br><br>

        <button type="submit">
            Create Account
        </button>

    </form>

    <br>

    <p>
        Already have an account?
        <a href="/login">
            Login Here
        </a>
    </p>

</div>

{% endblock %}
