{% extends "base.html" %}

{% block title %}
Login
{% endblock %}

{% block content %}

<div class="auth-container">

    <h1>Welcome Back 👋</h1>

    <p>
        Login to continue writing stories.
    </p>

    <form method="POST">

        <input
            type="email"
            name="email"
            placeholder="Email Address"
            required
        >

        <br><br>

        <input
            type="password"
            name="password"
            placeholder="Password"
            required
        >

        <br><br>

        <button type="submit">
            Login
        </button>

    </form>

    <br>

    <p>
        Don't have an account?
        <a href="/register">
            Register Here
        </a>
    </p>

</div>

{% endblock %}
